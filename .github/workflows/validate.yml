name: Validate Skill

on: [push, pull_request]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check SKILL.md has required frontmatter
        run: |
          if ! grep -q "^name:" SKILL.md; then
            echo "ERROR: SKILL.md missing 'name' in frontmatter"
            exit 1
          fi
          if ! grep -q "^description:" SKILL.md; then
            echo "ERROR: SKILL.md missing 'description' in frontmatter"
            exit 1
          fi
          echo "SKILL.md frontmatter OK"

      - name: Check all referenced files exist
        run: |
          python3 - << 'EOF'
          import re, sys, os

          with open("SKILL.md") as f:
              content = f.read()

          refs = re.findall(r'`(references/[^`]+\.md)`', content)
          missing = [r for r in refs if not os.path.exists(r)]

          if missing:
              print("ERROR: Referenced files not found:")
              for m in missing:
                  print(f"  - {m}")
              sys.exit(1)

          print(f"All {len(refs)} referenced files exist: OK")
          EOF

      - name: Check SKILL.md line count
        run: |
          lines=$(wc -l < SKILL.md)
          echo "SKILL.md: $lines lines"
          if [ "$lines" -gt 350 ]; then
            echo "WARNING: SKILL.md exceeds 350 lines ($lines). Consider moving content to references/."
          fi

      - name: List all reference files
        run: |
          echo "Reference files:"
          ls references/
